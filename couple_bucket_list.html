<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ふたりのやりたい事リスト</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;
  background:#FFF5F8;
  min-height:100vh;
  padding:1.5rem 1rem 3rem;
}
.app{max-width:600px;margin:0 auto}
.header{text-align:center;margin-bottom:1.75rem}
.header h1{font-size:22px;font-weight:600;color:#993556;letter-spacing:.02em}
.header p{font-size:13px;color:#D4537E;margin-top:5px}
.add-area{
  background:#fff;border:1px solid #F4C0D1;
  border-radius:16px;padding:1rem;margin-bottom:1.25rem;
  box-shadow:0 2px 12px rgba(212,83,126,.08);
}
.add-row{display:flex;gap:8px;margin-bottom:8px}
.add-row input{
  flex:1;padding:9px 13px;border:1px solid #F4C0D1;
  border-radius:10px;font-size:14px;background:#FFF5F8;
  color:#3a3a3a;outline:none;font-family:inherit;
}
.add-row input:focus{border-color:#D4537E}
.add-opts{display:flex;gap:8px}
.cat-select,.pri-select{
  flex:1;padding:7px 10px;border:1px solid #F4C0D1;
  border-radius:10px;font-size:13px;background:#FFF5F8;
  color:#3a3a3a;outline:none;font-family:inherit;
}
.add-btn{
  background:linear-gradient(135deg,#ED93B1,#D4537E);
  color:#fff;border:none;border-radius:10px;
  padding:9px 18px;font-size:14px;font-weight:600;
  cursor:pointer;white-space:nowrap;transition:opacity .15s;font-family:inherit;
}
.add-btn:hover{opacity:.85}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.filter-btn{
  padding:5px 13px;border-radius:20px;border:1px solid #F4C0D1;
  background:#fff;color:#993556;font-size:12px;cursor:pointer;
  transition:all .15s;font-family:inherit;
}
.filter-btn.active{background:#D4537E;border-color:#D4537E;color:#fff;font-weight:600}
.progress-label{font-size:12px;color:#D4537E;text-align:right;margin-bottom:5px}
.progress-bar{height:7px;background:#F4C0D1;border-radius:4px;margin-bottom:1.25rem;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#ED93B1,#D4537E);border-radius:4px;transition:width .4s ease}
.item{
  display:flex;align-items:center;gap:10px;padding:.75rem 1rem;
  background:#fff;border:1px solid #F4C0D1;border-radius:12px;
  margin-bottom:8px;transition:all .2s;
  box-shadow:0 1px 6px rgba(212,83,126,.06);
}
.item.done{opacity:.55}
.item.done .item-title{text-decoration:line-through;color:#aaa}
.check-btn{
  width:26px;height:26px;border-radius:50%;border:2px solid #ED93B1;
  background:transparent;cursor:pointer;display:flex;align-items:center;
  justify-content:center;flex-shrink:0;transition:all .15s;font-size:13px;color:#fff;
}
.check-btn.checked{background:#D4537E;border-color:#D4537E}
.item-body{flex:1;min-width:0}
.item-title{font-size:14px;color:#3a3a3a}
.item-meta{display:flex;gap:6px;margin-top:4px;align-items:center}
.cat-badge{font-size:11px;padding:2px 9px;border-radius:12px;font-weight:600}
.pri-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.pri-label{font-size:11px;color:#aaa}
.del-btn{background:none;border:none;cursor:pointer;color:#F4C0D1;font-size:16px;padding:2px 4px;border-radius:4px;transition:color .15s;flex-shrink:0}
.del-btn:hover{color:#E24B4A}
.empty{text-align:center;padding:2.5rem;color:#D4537E;font-size:14px;opacity:.6}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>💕 ふたりのやりたい事リスト</h1>
    <p>一緒に叶えていこう</p>
  </div>

  <div class="add-area">
    <div class="add-row">
      <input id="new-title" type="text" placeholder="やりたい事を入力..." />
      <button class="add-btn" onclick="addItem()">追加</button>
    </div>
    <div class="add-opts">
      <select class="cat-select" id="new-cat">
        <option value="travel">✈ 旅行</option>
        <option value="food">🍽 グルメ</option>
        <option value="exp">🎡 体験</option>
        <option value="movie">🎬 エンタメ</option>
        <option value="other">💭 その他</option>
      </select>
      <select class="pri-select" id="new-pri">
        <option value="high">★★★ 最優先</option>
        <option value="mid">★★☆ 普通</option>
        <option value="low">★☆☆ いつか</option>
      </select>
    </div>
  </div>

  <div class="filter-row">
    <button class="filter-btn active" onclick="setFilter('all',this)">すべて</button>
    <button class="filter-btn" onclick="setFilter('travel',this)">✈ 旅行</button>
    <button class="filter-btn" onclick="setFilter('food',this)">🍽 グルメ</button>
    <button class="filter-btn" onclick="setFilter('exp',this)">🎡 体験</button>
    <button class="filter-btn" onclick="setFilter('movie',this)">🎬 エンタメ</button>
    <button class="filter-btn" onclick="setFilter('other',this)">💭 その他</button>
    <button class="filter-btn" onclick="setFilter('done',this)">✅ 達成済み</button>
  </div>

  <div id="main"></div>
</div>

<script>
const CAT={
  travel:{label:"✈ 旅行",bg:"#E6F1FB",color:"#0C447C"},
  food:{label:"🍽 グルメ",bg:"#EAF3DE",color:"#3B6D11"},
  exp:{label:"🎡 体験",bg:"#FAEEDA",color:"#854F0B"},
  movie:{label:"🎬 エンタメ",bg:"#EEEDFE",color:"#3C3489"},
  other:{label:"💭 その他",bg:"#F1EFE8",color:"#444441"}
};
const PRI={
  high:{color:"#D4537E",label:"最優先"},
  mid:{color:"#EF9F27",label:"普通"},
  low:{color:"#85B7EB",label:"いつか"}
};

let items=[
  {id:1,title:"USJに行く",cat:"exp",pri:"high",done:false},
  {id:2,title:"京都の旅館に泊まる",cat:"travel",pri:"high",done:false},
  {id:3,title:"話題のイタリアンを食べに行く",cat:"food",pri:"mid",done:false},
  {id:4,title:"花火大会を見る",cat:"exp",pri:"mid",done:true},
];
let filter="all";
let nextId=5;

function save(){try{localStorage.setItem("bucketlist",JSON.stringify(items));localStorage.setItem("bucketlistId",nextId)}catch(e){}}
function load(){try{const d=localStorage.getItem("bucketlist");if(d)items=JSON.parse(d);const n=localStorage.getItem("bucketlistId");if(n)nextId=parseInt(n)}catch(e){}}

function addItem(){
  const t=document.getElementById("new-title").value.trim();
  if(!t)return;
  items.unshift({id:nextId++,title:t,cat:document.getElementById("new-cat").value,pri:document.getElementById("new-pri").value,done:false});
  document.getElementById("new-title").value="";
  save();render();
}
document.getElementById("new-title").addEventListener("keydown",e=>{if(e.key==="Enter")addItem()});

function toggle(id){const item=items.find(i=>i.id===id);if(item)item.done=!item.done;save();render();}
function del(id){if(confirm("削除しますか？")){items=items.filter(i=>i.id!==id);save();render();}}
function setFilter(f,el){
  filter=f;
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");render();
}

function render(){
  const done=items.filter(i=>i.done).length;
  const total=items.length;
  const pct=total?Math.round(done/total*100):0;
  let visible;
  if(filter==="done") visible=items.filter(i=>i.done);
  else if(filter==="all") visible=items.filter(i=>!i.done);
  else visible=items.filter(i=>i.cat===filter&&!i.done);

  let html=`<div class="progress-label">${done} / ${total} 達成 (${pct}%)</div>
<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>`;

  if(visible.length===0){
    html+=`<div class="empty">まだ項目がありません 🌸</div>`;
  } else {
    html+=visible.map(it=>{
      const c=CAT[it.cat]||CAT.other;
      const p=PRI[it.pri]||PRI.mid;
      return `<div class="item${it.done?" done":""}">
  <button class="check-btn${it.done?" checked":""}" onclick="toggle(${it.id})">${it.done?"✓":""}</button>
  <div class="item-body">
    <div class="item-title">${it.title}</div>
    <div class="item-meta">
      <span class="cat-badge" style="background:${c.bg};color:${c.color}">${c.label}</span>
      <span class="pri-dot" style="background:${p.color}"></span>
      <span class="pri-label">${p.label}</span>
    </div>
  </div>
  <button class="del-btn" onclick="del(${it.id})">✕</button>
</div>`;
    }).join("");
  }
  document.getElementById("main").innerHTML=html;
}

load();render();
</script>
</body>
</html>
